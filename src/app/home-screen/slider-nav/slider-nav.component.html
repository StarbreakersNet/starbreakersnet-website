<div class="ui centered grid">
  <div class="nav-container">
    <div class="ui fluid borderless menu app-navigation">
      <div class="item" *ngFor="let element of elements; let i = index; first as isFirst" [class.selected]="isFirst">
        <a class="ui fluid button" [ngStyle]="{'background-color': element.color}">
          <img class="ui image" src="{{element.src}}">
        </a>
      </div>
    </div>
    <div class="ui equal width three column compact grid apps-container">
      <div class="column paralaxTile-container">
        <button class="ui fluid card poster">
          <div class="shine">
          </div>
          <div class="layer-1 image logo">
            <img src="assets/images/applications/teamspeak/ts_stacked_bluelight.png">
          </div>
          <div class="layer-2 image">
            <img style="background-image: url('https://designmodo.com/demo/apple-tv-parallax/images/2.png');">
          </div>
          <div class="layer-3 image">
            <img style="top: 0; bottom: 0; left: 0; right: 0; background-image: url('https://designmodo.com/demo/apple-tv-parallax/images/3.png');">
          </div>
          <div class="layer-4 image">
            <img style="background-image: url('https://designmodo.com/demo/apple-tv-parallax/images/4.png');">
          </div>
          <div class="layer-5 image">
            <img style="background-image: url('https://designmodo.com/demo/apple-tv-parallax/images/5.png');">
          </div>
        </button>
      </div>
      <div class="column">
        <div class="atvImg">
          <div class="atvImg-layer" data-img="assets/images/applications/aptImg/back.png"></div>
          <div class="atvImg-layer" data-img="assets/images/applications/aptImg/front.png"></div>
        </div>
      </div>
      <div class="column">
        <button style="background-color: blue;">c</button>
      </div>
    </div>
  </div>
</div>
